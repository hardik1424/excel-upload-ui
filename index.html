<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>

/* 🌈 Background */
body{
background: linear-gradient(135deg,#667eea,#764ba2);
}

/* ✨ Glass Card */
.card{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.15);
border: 1px solid rgba(255,255,255,0.2);
}

/* 📂 Drop Area Animation */
.drop-area{
border:2px dashed rgba(255,255,255,0.5);
transition: all .3s ease;
}

.drop-area:hover{
background: rgba(255,255,255,0.1);
transform: scale(1.02);
}

/* 🔘 Toggle Button */
.toggle-btn{
transition: all .3s ease;
}

.active{
background: white;
color:#4f46e5;
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* 🚀 Upload Button */
.upload-btn{
background: linear-gradient(135deg,#6366f1,#4f46e5);
transition: all .3s ease;
}

.upload-btn:hover{
transform: translateY(-2px) scale(1.02);
box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* 📊 Progress Animation */
#progressBar{
transition: width .5s ease;
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div class="card shadow-2xl rounded-2xl p-8 w-full max-w-md">

<h1 class="text-3xl font-bold text-center mb-2">Upload File</h1>
<p class="text-center text-gray-200 mb-6">Upload your Excel orders</p>

<!-- 🔘 Platform Toggle -->
<div class="flex bg-white bg-opacity-20 rounded-lg p-1 mb-6">

<button id="shopifyBtn" class="toggle-btn flex-1 py-2 rounded-lg active">
Shopify
</button>

<button id="websiteBtn" class="toggle-btn flex-1 py-2 rounded-lg">
Website
</button>

</div>

<!-- 📂 Drop Area -->
<div id="dropArea" class="drop-area rounded-xl p-8 text-center cursor-pointer">

<p class="text-lg">📂 Drag & Drop File</p>
<p class="text-sm opacity-80">or click to browse</p>

<input id="fileInput" type="file" accept=".xlsx,.xls,.csv" class="hidden">

</div>

<div id="fileName" class="text-sm mt-3 text-center"></div>

<!-- 🚀 Upload Button -->
<button id="uploadBtn" class="upload-btn mt-6 w-full py-3 rounded-lg font-semibold">
Upload Now 🚀
</button>

<!-- 📊 Progress -->
<div id="progressBox" class="mt-4 hidden">

<div class="w-full bg-white bg-opacity-20 rounded-full h-2">
<div id="progressBar" class="bg-white h-2 rounded-full w-0"></div>
</div>

<p id="statusText" class="text-sm text-center mt-2"></p>

</div>

</div>

<script>

const dropArea = document.getElementById("dropArea")
const fileInput = document.getElementById("fileInput")
const uploadBtn = document.getElementById("uploadBtn")
const fileName = document.getElementById("fileName")
const progressBox = document.getElementById("progressBox")
const progressBar = document.getElementById("progressBar")
const statusText = document.getElementById("statusText")

const shopifyBtn = document.getElementById("shopifyBtn")
const websiteBtn = document.getElementById("websiteBtn")

let selectedFile = null
let selectedPlatform = "shopify"

// 🌐 Webhooks
const webhooks = {
shopify: "https://tmperfumehouse.app.n8n.cloud/webhook-test/upload-orders",
website: "https://tmperfumehouse.app.n8n.cloud/webhook-test/d5ccc386-0372-4a37-b207-429fb8ff071d"
}

// 🔘 Toggle Animation
function activate(btn){
shopifyBtn.classList.remove("active")
websiteBtn.classList.remove("active")
btn.classList.add("active")
}

shopifyBtn.onclick = ()=>{
selectedPlatform = "shopify"
activate(shopifyBtn)
}

websiteBtn.onclick = ()=>{
selectedPlatform = "website"
activate(websiteBtn)
}

// 📂 File select
dropArea.onclick = ()=> fileInput.click()

fileInput.onchange = ()=>{
selectedFile = fileInput.files[0]
fileName.innerText = selectedFile ? "📄 " + selectedFile.name : ""
}

// Drag
dropArea.ondragover = e => e.preventDefault()

dropArea.ondrop = e => {
e.preventDefault()
selectedFile = e.dataTransfer.files[0]
fileName.innerText = "📄 " + selectedFile.name
}

// 🚀 Upload
uploadBtn.onclick = async ()=>{

if(!selectedFile){
alert("Select file first")
return
}

const formData = new FormData()
formData.append("file",selectedFile)

progressBox.classList.remove("hidden")
statusText.innerText = "Uploading..."
progressBar.style.width="30%"

try{

const res = await fetch(webhooks[selectedPlatform],{
method:"POST",
body:formData
})

if(res.ok){
progressBar.style.width="100%"
statusText.innerText = "✅ Upload successful"
}else{
statusText.innerText = "❌ Server error"
}

}catch(err){
statusText.innerText = "❌ Upload failed"
}

}

</script>

</body>
</html>
